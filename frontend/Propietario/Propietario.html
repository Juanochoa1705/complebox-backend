<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panel Propietario</title>
    
<style>
    * {
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #0d47a1, #1976d2);
        display: flex;
        justify-content: center;
        align-items: flex-start; /* Cambiado para que en móviles largos se pueda scrollear */
    }

    .mobile {
        width: 80%;
        max-width: 500px; /* Un ancho máximo realista para apps móviles */
        min-height: 100vh;
        background: #fff;
        padding: 30px 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* Ajustes para pantallas grandes (Escritorio) */
    @media (min-width: 768px) {
        body {
            align-items: center;
            padding: 20px;
        }
        .mobile {
            min-height: auto;
            height: 90vh;
            border-radius: 30px;
        }
    }

    .logo {
        width: 150px; /* Tamaño más equilibrado */
        margin: 0 auto 20px;
        display: block;
    }

    h2 {
        text-align: center;
        color: #0d47a1;
        font-size: 24px;
        margin: 10px 0;
        font-family: 'Segoe UI', sans-serif;
    }

    #ubicacion {
        text-align: center;
        font-size: 16px;
        color: #666;
        margin-bottom: 20px;
    }

    .card {
        background: #f5f7fa;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 15px;
        border: 1px solid #eee;
    }

    .nombre {
        font-size: 18px;
        font-weight: bold;
        color: #333;
        font-family: 'Segoe UI', sans-serif;
    }

    .cedula {
        font-size: 14px;
        color: #777;
        margin: 5px 0 15px;
        font-family: 'Segoe UI', sans-serif;
    }

    button {
        width: 100%;
        padding: 15px;
        background: #1976d2;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: bold;
        font-family: 'Segoe UI', sans-serif;
        cursor: pointer;
        transition: background 0.3s;
    }

    button:active {
        transform: scale(0.98);
    }

    .logout {
        background: #fdeded;
        color: #e53935;
        font-size: 16px;
        margin-top: auto; /* Empuja el botón al final */
        border: 1px solid #f8d7da;
    }

    .empty {
        text-align: center;
        color: #999;
        font-size: 16px;
        padding: 40px 20px;
    }
    </style>
</head>

<body>



<div class="mobile">

    <img src="../assets/logo.png" class="logo">
    <h2 id="titulo"></h2>
    <p id="ubicacion"></p>

    <div style="text-align:center; margin:10px 0;">
      <span style="background:#e3f2fd; color:#1976d2; padding:6px 12px; border-radius:20px; font-size:14px;">
        🏢 Propietario activo
      </span>
    </div>

    <div class="lista" id="listaResidentes"></div>

    <p class="empty" id="mensajeVacio" style="display:none;">
      📭 No tienes residentes pendientes
    </p>
    <button onclick="irAResidente()">📦 Ver mis pedidos</button>
    <div class="footer">
      <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

  </div>

<script>

const lista = document.getElementById("listaResidentes");
const mensaje = document.getElementById("mensajeVacio");

async function cargarResidentesPendientes(){

  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:3000/propietario/residentes-pendientes",{
    headers:{
      Authorization:`Bearer ${token}`
    }
  });

  const residentes = await res.json();

  lista.innerHTML="";

  if(!Array.isArray(residentes) || residentes.length===0){
    mensaje.style.display="block";
    return;
  }

  mensaje.style.display="none";

  residentes.forEach(r=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
  <div class="nombre">${r.nombres} ${r.apellidos}</div>
  <div class="cedula">Cédula: ${r.cedula}</div>

  <button class="btn" onclick="aprobarResidente(${r.cod_user})">
    ✔ Aprobar residente
  </button>

  <button class="btn" onclick="rechazarResidente(${r.cod_user})">
    ❌ Rechazar residente
  </button>
`;

    lista.appendChild(card);

  });

}

async function rechazarResidente(codUser){

  const confirmar = confirm("¿Seguro que deseas eliminar este residente?");
  if (!confirmar) return;

  const token = localStorage.getItem("token");

  try {

    const res = await fetch(`http://localhost:3000/propietario/rechazar/${codUser}`,{
      method:"POST",
      headers:{
        Authorization:`Bearer ${token}`
      }
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data.message);

    alert("❌ Residente eliminado");

    cargarResidentesPendientes();

  } catch (err) {
    alert(err.message);
  }
}

async function aprobarResidente(codUser){

  const token=localStorage.getItem("token");

  await fetch("http://localhost:3000/propietario/aprobar-residente",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:`Bearer ${token}`
    },
    body:JSON.stringify({
      cod_user:codUser
    })
  });

  alert("✅ Residente aprobado");

  cargarResidentesPendientes();
}

async function cargarPerfil(){

  const token = localStorage.getItem("token");

  const res = await fetch("http://localhost:3000/propietario/perfil",{
    headers:{
      Authorization:`Bearer ${token}`
    }
  });

  const data = await res.json();

 document.getElementById("titulo").innerText =
  `👋 Hola, ${data.nombres} ${data.apellidos}`;

  document.getElementById("ubicacion").innerText =
    `🏢 Torre ${data.torre} • Apto ${data.apto}-Propietari@`;
}

function irAResidente() {
  window.location.href = "../residente/residente.html";
}

function cerrarSesion(){
  localStorage.clear();
  window.location.href = '../login.html';
}

cargarPerfil();
cargarResidentesPendientes();

</script>

</body>
</html>
