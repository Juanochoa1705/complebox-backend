<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Propietario</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; padding: 0; min-height: 100vh; background: linear-gradient(180deg, #0d47a1, #1976d2); display: flex; justify-content: center; align-items: flex-start; }
        .mobile { width: 90%; max-width: 500px; min-height: 100vh; background: #fff; padding: 30px 20px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        @media (min-width: 768px) { body { align-items: center; padding: 20px; } .mobile { min-height: auto; height: 90vh; border-radius: 30px; overflow-y: auto; } }
        .logo { width: 120px; margin: 0 auto 10px; display: block; }
        h2 { text-align: center; color: #0d47a1; font-size: 22px; margin: 5px 0; }
        h3 { color: #0d47a1; border-bottom: 2px solid #eee; padding-bottom: 5px; margin-top: 20px; }
        #ubicacion { text-align: center; font-size: 14px; color: #666; margin-bottom: 15px; }
        .card, .card-residente { background: #f5f7fa; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .nombre { font-size: 16px; font-weight: bold; color: #333; }
        .cedula { font-size: 13px; color: #777; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: #1976d2; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-aprobar { background: #2e7d32; }
        .btn-rechazar { background: #d32f2f; }
        .logout { background: #fdeded; color: #e53935; margin-top: 20px; border: 1px solid #f8d7da; }
        .empty { text-align: center; color: #999; font-size: 14px; padding: 20px; }
     .iconos-flotantes {
  position: absolute;
  top: 15px;
  right: 15px;
  display: flex;
  flex-direction: column; /* 🔥 esto los pone hacia abajo */
  gap: 10px; /* espacio entre iconos */
}

.modo-switch {
  background: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.modo-switch:hover {
  transform: scale(1.1);
}

.modo-switch:active {
  transform: scale(0.95);
}
.mobile {
  position: relative; /* 🔥 CLAVE */
}
        
    </style>
</head>
<body>

<div class="mobile">
    <img src="../assets/logo.png" class="logo">
    <h2 id="titulo">Cargando...</h2>
    <p id="ubicacion"></p>

    <div style="text-align:center; margin-bottom:20px;">
        <span style="background:#e3f2fd; color:#1976d2; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:bold;">
            🏢 PROPIETARIO ACTIVO
        </span>
    </div>

    <h3>⏳ Por Aprobar</h3>
    <div id="contenedorPendientes"></div>
    <p class="empty" id="mensajeVacio" style="display:none;">📭 Sin solicitudes pendientes</p>

    <div class="box">
        <h3>👨‍👩‍👧 Mis Residentes</h3>
        <div id="contenedorAprobados"></div>
    </div>

    <button onclick="irAResidente()" style="margin-top:20px; background:#444;">📦 Ver mis pedidos</button>
    <div class="iconos-flotantes">
     <div class="modo-switch" onclick="irModoMensajero()">
    🚚
  </div>
  <div class="modo-switch" onclick="irModoVigilante()">
    👮‍♂️
  </div>
    </div>
    <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
    <a href="../cambiar-apto.html">¿Deseas registrarte en otro Apartamento/conjunto?</a>
</div>

<script>
// 1. CONFIGURACIÓN INICIAL
const API = "http://localhost:3000";
const token = localStorage.getItem("token");
const estadoEspecial = localStorage.getItem("estadoEspecialProp");
const mensaje = localStorage.getItem("mensajeEstadoProp");

// 2. EL "MATAPERROS" (Si hay bloqueo, se detiene TODO)
if (estadoEspecial === "true") {
    document.body.innerHTML = `
    <div style="height:100vh; display:flex; justify-content:center; align-items:center; text-align:center; padding:20px; font-family:sans-serif; background:#f0f2f5;">
      <div style="background:white; padding:40px; border-radius:15px; box-shadow:0 8px 30px rgba(0,0,0,0.1); border-top: 8px solid #003366; max-width: 400px;">
        <h2 style="color:#003366; margin-top:0;">⚠️ Acceso restringido</h2>
        <p style="color:#555; margin-bottom:25px;">${mensaje}</p>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button onclick="volver()" style="background:#003366; color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">⬅️ Volver</button>
            <button onclick="cerrarSesion()" style="background:transparent; color:#d32f2f; border:1px solid #d32f2f; padding:10px; border-radius:8px; cursor:pointer;">Cerrar sesión</button>
        </div>
      </div>
    </div>`;

    // FORZAMOS LA PARADA DEL SCRIPT
    window.stop(); // Detiene la carga de la página
    throw new Error("Bucle detenido: Usuario bloqueado"); 
}

// 3. CARGA NORMAL (Solo llega aquí si NO entró al IF de arriba)
cargarPerfil();

async function cargarPerfil() {
    try {
        const res = await fetch(`${API}/propietario/perfil`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();

        if (data.accesoRestringido) {
            localStorage.setItem("estadoEspecialProp", "true");
            localStorage.setItem("mensajeEstadoProp", data.mensaje);
            location.reload(); // Solo recargará UNA VEZ para activar el bloqueo de arriba
            return;
        }

        // Si llegamos aquí, el usuario es legal
        localStorage.setItem("estadoEspecialProp", "false");
        document.getElementById("titulo").innerText = `👋 Hola, ${data.nombres}`;
        document.getElementById("ubicacion").innerText = `🏢 Torre ${data.torre} • Apto ${data.apto}`;
    } catch (err) {
        console.error(err);
    }
}

function volver() { window.history.back(); }
function cerrarSesion() { localStorage.clear(); window.location.href = "../login.html"; }

// Función para residentes que esperan aprobación
async function cargarResidentesPendientes(){
    const listaUI = document.getElementById("contenedorPendientes");
    const mensajeUI = document.getElementById("mensajeVacio");

    try {
        const res = await fetch(`${API}/propietario/residentes-pendientes`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const residentes = await res.json();
        
        listaUI.innerHTML = "";

        if(!Array.isArray(residentes) || residentes.length === 0){
            mensajeUI.style.display = "block";
            return;
        }

        mensajeUI.style.display = "none";
        residentes.forEach(r => {
            listaUI.innerHTML += `
                <div class="card">
                    <div class="nombre">${r.nombres} ${r.apellidos}</div>
                    <div class="cedula">Cédula: ${r.cedula}</div>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-aprobar" onclick="aprobarResidente(${r.cod_user})">Aprobar</button>
                        <button class="btn-rechazar" onclick="rechazarResidente(${r.cod_user})">Rechazar</button>
                    </div>
                </div>`;
        });
    } catch (err) { console.error(err); }
}

// Función para residentes ya vinculados
async function cargarResidentes() {
    const contenedorUI = document.getElementById("contenedorAprobados");
    
    try {
        // 1. Obtenemos primero tu perfil para saber cuál es tu ID
        const resPerfil = await fetch(`${API}/propietario/perfil`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const miPerfil = await resPerfil.json();
        const miId = Number(miPerfil.cod_user); // Tu ID convertido a número

        // 2. Obtenemos los residentes vinculados
        const res = await fetch(`${API}/propietario/mis-residentes`, {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        
        contenedorUI.innerHTML = "";

        data.forEach(ap => {
            if (ap.apto && ap.apto.apto_residente) {
                ap.apto.apto_residente.forEach(r => {
                    const p = r.persona; 
                    if (!p) return;

                    // 3. FILTRO: Si el ID del residente es igual al tuyo, no lo dibujamos
                    if (Number(r.fk_cod_residente) === miId) {
                        return; 
                    }

                    // 4. Dibujamos solo a los demás residentes
                    contenedorUI.innerHTML += `
                        <div class="card-residente" style="border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                            <b>${p.nombres} ${p.apellidos}</b><br>
                            <small>Estado: ${r.fk_estado_apto_residente === 1 ? "🟢 Activo" : "🔴 Inactivo"}</small>
                            <div style="display:flex; gap:5px; margin-top:10px;">
                                <button style="padding:8px; background:#4caf50; color:white; border:none; border-radius:5px; cursor:pointer;" 
                                        onclick="cambiarEstado(${r.fk_cod_residente}, 1)">Activar</button>
                                <button style="padding:8px; background:#ff9800; color:white; border:none; border-radius:5px; cursor:pointer;" 
                                        onclick="cambiarEstado(${r.fk_cod_residente}, 2)">Inactivar</button>
                            </div>
                        </div>`;
                });
            }
        });
    } catch (err) { 
        console.error("Error en cargarResidentes:", err); 
    }
}

async function aprobarResidente(codUser){
    await fetch(`${API}/propietario/aprobar-residente`, {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
        body: JSON.stringify({ cod_user: codUser })
    });
    alert("Residente aprobado");
    actualizarTodo();
}

async function rechazarResidente(codUser){
    if (!confirm("¿Eliminar solicitud?")) return;
    await fetch(`${API}/propietario/rechazar/${codUser}`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` }
    });
    actualizarTodo();
}

async function cambiarEstado(id, estado) {
  // Usamos el token que ya tienes definido globalmente
  // o lo obtenemos de nuevo para estar seguros
  const tokenParaEnviar = localStorage.getItem("token");

  const res = await fetch(`${API}/propietario/estado-residente`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      // Verifica que no falte el espacio después de Bearer
      "Authorization": "Bearer " + tokenParaEnviar 
    },
    body: JSON.stringify({
      cod_residente: id,
      estado: estado
    })
  });

  if (res.ok) {
    // Si la respuesta es 200, recargamos la lista
    cargarResidentes();
  } else if (res.status === 401) {
    console.error("Error 401: El servidor no reconoció el token en esta petición.");
  } else {
    const errorData = await res.json();
    alert("Error: " + errorData.message);
  }
}

function actualizarTodo() {
    cargarPerfil();
    cargarResidentes();
    cargarResidentesPendientes();
}

function irAResidente() { window.location.href = "../residente/residente.html"; }
function cerrarSesion() { localStorage.clear(); window.location.href = '../login.html'; }
function irModoMensajero() { window.location.href = "../mensajero/mensajero.html"; }
function irModoVigilante() { window.location.href = "../vigilante/vigilante.html"; }
// INICIO
actualizarTodo();


</script>

</body>
</html>
