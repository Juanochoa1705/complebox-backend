<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="mobile">

  <h2>Panel Administrador</h2>

  <!-- CREAR CONJUNTO -->
  <div id="crearSection" class="d-none">

    <div class="form-group">
      <label>Nombre del conjunto</label>
      <input id="conjuntoNombre">
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input id="conjuntoTelefono">
    </div>

    <div class="form-group">
      <label>Cantidad de torres</label>
      <input id="torres" type="number">
    </div>

    <button onclick="crearConjunto()">Crear conjunto</button>
  </div>

  <!-- INFO -->
  <div id="infoSection" class="d-none">

    <p><strong>Nombre:</strong> <span id="infoNombre"></span></p>
    <p><strong>Teléfono:</strong> <span id="infoTelefono"></span></p>

    <p><strong>Torres:</strong> <span id="cantidadTorres">0</span></p>

    <button onclick="verTorres()">Ver torres</button>

    <div id="listaTorres"></div>

    <div class="form-group">
      <input type="number" id="nuevaTorre" placeholder="Nueva torre">
    </div>

    <button onclick="agregarTorre()">Agregar torre</button>

    <hr>

    <!-- EMPRESA -->
    <form id="empresaForm">

      <div class="form-group">
        <input id="empresaNombre" placeholder="Nombre Empresa">
      </div>

      <div class="form-group">
        <input id="empresaNit" placeholder="NIT">
      </div>

      <div class="form-group">
        <input id="empresaTelefono" placeholder="Teléfono">
      </div>

      <div class="form-group">
        <input id="empresaCorreo" placeholder="Correo">
      </div>

      <div class="form-group">
        <input id="empresaDireccion" placeholder="Dirección">
      </div>

      <button type="submit">Crear Empresa</button>
    </form>

    <p id="empresaMessage" class="message"></p>

    <hr>

    <!-- VIGILANTES -->
    <h3>Vigilantes pendientes</h3>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Cédula</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tablaVigilantes"></tbody>
    </table>

    <p id="mensajeVacio" class="message">No hay vigilantes</p>
    <h2>📊 Historial de pedidos</h2>

<input type="text" id="buscarHistorial" placeholder="Buscar...">

<div id="tablaHistorial"></div>

    <button onclick="cerrarSesion()">Cerrar sesión</button>

  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
