<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Complebox | Registro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #0d47a1, #1976d2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    input,
select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 15px;
  background-color: #fff;
  appearance: none;        /* quita estilo nativo */
  -webkit-appearance: none;
  -moz-appearance: none;
}

input:focus,
select:focus {
  outline: none;
  border-color: #1976d2;
  box-shadow: 0 0 0 2px rgba(25,118,210,0.2);
}

.select-wrapper {
  position: relative;
}

.select-wrapper::after {
  content: "▾";
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #1976d2;
  pointer-events: none;
  font-size: 14px;
}


    /* CONTENEDOR TIPO CELULAR */
    .mobile {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 25px;
      overflow-y: auto;
    }

    .logo {
      display: block;
      margin: 20px auto 10px;
      width: 120px;
    }

    h2 {
      text-align: center;
      color: #0d47a1;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      font-size: 13px;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #1976d2;
      box-shadow: 0 0 0 2px rgba(25,118,210,0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .message {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>

<body>

  <div class="mobile">
    <img src="assets/logo.png" class="logo" alt="Complebox">
    <h2>Crear cuenta</h2>

    <form id="registerForm">

      <div class="form-group">
        <label>Nombres</label>
        <input id="nombres" required>
      </div>

      <div class="form-group">
        <label>Apellidos</label>
        <input id="apellidos" required>
      </div>


      <div class="form-group">
  <label>Tipo de documento</label>
  <div class="select-wrapper">
  <select id="fk_tipo_doc" required>
    <option value="">Seleccione tipo de documento</option>
    <option value="1">CC</option>
    <option value="2">CE</option>
    <option value="3">TI</option>
    <option value="4">PE</option>
  </select>
</div>
</div>

      <div class="form-group">
        <label>Cédula</label>
        <input id="cedula" required>
      </div>

     <div class="form-group">
  <label>Rol</label>
  <div class="select-wrapper">
    <select id="fk_rol" required>
      <option value="">Seleccione su rol</option>
      <option value="4">Vigilante</option>
      <option value="3">Residente</option>
      <option value="5">Mensajero</option>
    </select>
  </div>
</div> 

      <div id="empresaMensajeroGroup" style="display:none;">

  <h4>Empresa de mensajería</h4>

  <div class="form-group">
    <label>NIT</label>
    <input id="nit_empresa">
  </div>

  <div class="form-group">
    <label>Nombre</label>
    <input id="nombre_empresa">
  </div>

  <div class="form-group">
    <label>Dirección Empresa</label>
    <input id="direccion_empresa">
  </div>

  <div class="form-group">
    <label>Teléfono Empresa</label>
    <input id="telefono_empresa">
  </div>

  <div class="form-group">
    <label>Correo Empresa</label>
    <input id="correo_empresa">
  </div>

</div> 

    <div class="form-group" id="empresaGroup" style="display:none;">

  <label>Buscar empresa de seguridad</label>

  <input type="text" id="buscarEmpresa" placeholder="Escribe el nombre de la empresa">

  <div id="resultadosEmpresas" style="
    border:1px solid #ccc;
    border-radius:10px;
    max-height:150px;
    overflow-y:auto;
    margin-top:5px;
  "></div>

</div>

      <div class="form-group">
        <label>Correo personal</label>
        <input type="email" id="correo" required>
      </div>

      <div class="form-group">
        <label>Teléfono personal</label>
        <input id="telefono" required>
      </div>

      <div class="form-group">
        <label>Usuario</label>
        <input id="usuario" required>
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" required>
      </div>

      <div class="form-group" id="aptoGroup" style="display:none;">
  <label>Seleccione su apartamento</label>
  <input type="text" id="buscarApto" placeholder="Buscar conjunto o apto...">
<div id="resultadosAptos"></div>
<input type="hidden" id="aptoSelect">
</div>


        
      <button type="submit">Registrarme</button>
    </form>

    <center><div class="link">
      <a href="login.html">ingresar</a>
    </div></center>

    <div id="message" class="message"></div>
  </div>

  <script>

// ==============================
// VARIABLES GLOBALES
// ==============================
const form = document.getElementById('registerForm');
const message = document.getElementById('message');
const rolSelect = document.getElementById("fk_rol");

const aptoGroup = document.getElementById("aptoGroup");
const empresaGroup = document.getElementById("empresaGroup");
const empresaMensajeroGroup = document.getElementById("empresaMensajeroGroup");

// 🔥 BUSCADORES
let aptosGlobal = [];
let aptoSeleccionado = null;

let empresaSeleccionada = null;

// ==============================
// MOSTRAR CAMPOS SEGÚN ROL
// ==============================
if (rolSelect) {
  rolSelect.addEventListener("change", function () {

    if (empresaMensajeroGroup) empresaMensajeroGroup.style.display = "none";
    if (aptoGroup) aptoGroup.style.display = "none";
    if (empresaGroup) empresaGroup.style.display = "none";

    const rol = Number(this.value);

    // 🔵 RESIDENTE
    if (rol === 3 && aptoGroup) {
      aptoGroup.style.display = "block";
    }

    // 🟢 VIGILANTE → BUSCADOR (YA NO SELECT)
    else if (rol === 4 && empresaGroup) {
      empresaGroup.style.display = "block";
    }

    // 🟡 MENSAJERO
    else if (rol === 5 && empresaMensajeroGroup) {
      empresaMensajeroGroup.style.display = "block";
    }

  });
}

// ==============================
// CARGAR APTOS
// ==============================
async function cargarAptos() {
  try {
    const res = await fetch("http://localhost:3000/auth/aptos");
    aptosGlobal = await res.json();
  } catch (error) {
    console.error("Error cargando aptos:", error);
  }
}

// ==============================
// BUSCADOR DE APTOS
// ==============================
const inputBuscar = document.getElementById("buscarApto");

if (inputBuscar) {
  inputBuscar.addEventListener("input", () => {

    const texto = inputBuscar.value.toLowerCase();
    const contenedor = document.getElementById("resultadosAptos");

    if (!contenedor) return;

    contenedor.innerHTML = "";

    if (texto.length < 2) return;

    const filtrados = aptosGlobal.filter(a =>
      a.numero_apto.toString().includes(texto) ||
      a.torre?.numero_torre?.toString().includes(texto) ||
      a.torre?.conjunto?.nombre_conjunto?.toLowerCase().includes(texto) ||
      a.torre?.conjunto?.ciudad_conjunto?.toLowerCase().includes(texto)
    );

    filtrados.forEach(a => {

      const div = document.createElement("div");

      div.innerHTML = `
        🏙️ ${a.torre?.conjunto?.ciudad_conjunto || ''}
        - 🏢 ${a.torre?.conjunto?.nombre_conjunto || ''}
        - Torre ${a.torre?.numero_torre || ''}
        - Apto ${a.numero_apto}
      `;

      div.style.cursor = "pointer";
      div.style.padding = "8px";
      div.style.borderBottom = "1px solid #ccc";

      div.onclick = () => {
        aptoSeleccionado = a.cod_apto;

        inputBuscar.value =
          `${a.torre?.conjunto?.ciudad_conjunto || ''} - ${a.torre?.conjunto?.nombre_conjunto || ''} - Torre ${a.torre?.numero_torre || ''} - Apto ${a.numero_apto}`;

        contenedor.innerHTML = "";
      };

      contenedor.appendChild(div);
    });

  });
}

// ==============================
// BUSCADOR DE EMPRESAS 🔥 (NUEVO)
// ==============================
const inputEmpresa = document.getElementById("buscarEmpresa");
const contenedorEmpresas = document.getElementById("resultadosEmpresas");

if (inputEmpresa) {
  inputEmpresa.addEventListener("input", async () => {

    const texto = inputEmpresa.value.trim();

    if (!contenedorEmpresas) return;

    contenedorEmpresas.innerHTML = "";

    if (texto.length < 2) return;

   try {

  const res = await fetch(`http://localhost:3000/acceso/empresas?q=${texto}`, {
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  console.log("RESPUESTA BACK:", data); // 🔥 CLAVE

  contenedorEmpresas.innerHTML = "";

  // ✅ VALIDACIÓN PRO
  if (!Array.isArray(data)) {
    console.error("No es array:", data);
    return;
  }

  data.forEach(emp => {

    const div = document.createElement("div");

    div.innerText = `${emp.empresa.nombre_empresa} - NIT: ${emp.empresa.nit_empresa}`;
    div.style.padding = "8px";
    div.style.cursor = "pointer";
    div.style.borderBottom = "1px solid #eee";

div.onclick = () => {
  console.log("EMPRESA SELECCIONADA:", emp); // 👈 agrega esto

  empresaSeleccionada = emp.cod_empresa_vig_conjunto;

  inputEmpresa.value = div.innerText;
  contenedorEmpresas.innerHTML = "";
};

    contenedorEmpresas.appendChild(div);
  });

} catch (error) {
  console.error("Error buscando empresas:", error);
}

  });
}

// ==============================
// ENVÍO FORMULARIO
// ==============================
if (form) {
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const rolValue = Number(rolSelect.value);

    const data = {
      nombres: document.getElementById('nombres').value,
      apellidos: document.getElementById('apellidos').value,
      cedula: document.getElementById('cedula').value,
      correo: document.getElementById('correo').value,
      telefono: document.getElementById('telefono').value,
      usuario: document.getElementById('usuario').value,
      password: document.getElementById('password').value,
      fk_rol: rolValue,
      fk_tipo_doc: Number(document.getElementById('fk_tipo_doc').value)
    };

    // 🔵 RESIDENTE
    if (rolValue === 3) {
      if (!aptoSeleccionado) {
        return alert("Selecciona un apartamento");
      }
      data.fk_apto = aptoSeleccionado;
    }

    // 🟢 VIGILANTE (BUSCADOR)
  if (rolValue === 4) {
  if (!empresaSeleccionada) {
    return alert("Selecciona una empresa");
  }

  data.fk_empresa_vig_conjunto = empresaSeleccionada;
}

    // 🟡 MENSAJERO
    if (rolValue === 5) {
      data.nit_empresa = document.getElementById("nit_empresa").value;
      data.nombre_empresa = document.getElementById("nombre_empresa").value;
      data.direccion_empresa = document.getElementById("direccion_empresa").value;
      data.telefono_empresa = document.getElementById("telefono_empresa").value;
      data.correo_empresa = document.getElementById("correo_empresa").value;
    }

    // ENDPOINT
    const endpoint =
      rolValue === 3
        ? 'http://localhost:3000/auth/register-residente'
        : rolValue === 4
        ? 'http://localhost:3000/auth/register-vigilante'
        : rolValue === 5
        ? 'http://localhost:3000/auth/register-mensajero'
        : 'http://localhost:3000/auth/register';

    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (!res.ok) throw new Error(result.message);

      message.textContent = '✅ Registro exitoso';
      message.className = 'message success';

      form.reset();
      aptoSeleccionado = null;
      empresaSeleccionada = null;

    } catch (err) {
      message.textContent = err.message || 'Error de conexión';
      message.className = 'message error';
    }
  });
}

// ==============================
// AUTOCOMPLETE EMPRESA MENSAJERO
// ==============================
const nitInput = document.getElementById("nit_empresa");

if (nitInput) {
  nitInput.addEventListener("blur", async () => {

    const nit = nitInput.value.trim();
    if (!nit) return;

    const res = await fetch(`http://localhost:3000/auth/empresa/${nit}`);

    if (!res.ok) {
      habilitarCamposEmpresa();
      return;
    }

    const empresa = await res.json();

    document.getElementById("nombre_empresa").value = empresa.nombre_empresa;
    document.getElementById("direccion_empresa").value = empresa.direccion_empresa;
    document.getElementById("telefono_empresa").value = empresa.telefono_empresa;
    document.getElementById("correo_empresa").value = empresa.correo_empresa;

    bloquearCamposEmpresa();
  });
}

// ==============================
// BLOQUEAR / HABILITAR CAMPOS
// ==============================
function bloquearCamposEmpresa() {
  ["nombre_empresa","direccion_empresa","telefono_empresa","correo_empresa"]
  .forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = true;
  });
}

function habilitarCamposEmpresa() {
  ["nombre_empresa","direccion_empresa","telefono_empresa","correo_empresa"]
  .forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.disabled = false;
      el.value = "";
    }
  });
}

// ==============================
// INIT
// ==============================
cargarAptos();

</script>


</body>
</html>
