<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompleBox - Panel de Aprobación</title>
    <style>
        /* TUS ESTILOS */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; height: 100vh; background: #f0f2f5; display: flex; justify-content: center; align-items: center; }
        .mobile { position: relative; width: 100%; max-width: 390px; height: 100vh; background: #fff; padding: 25px; overflow-y: auto; border: 1px solid #ddd; }
        h2 { text-align: center; color: #0d47a1; margin-bottom: 25px; }
        
        /* Tarjetas de usuarios */
        .card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-left: 5px solid #1976d2;
        }
        .card p { margin: 4px 0; color: #333; }
        .card .nombre { font-weight: bold; font-size: 1.1em; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        
        .btn-aprobar { background: #2e7d32; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; cursor: pointer; }
        .btn-rechazar { background: #c62828; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; cursor: pointer; }
        
        .iconos-flotantes { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; gap: 10px; }
        .modo-switch { background: white; border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="mobile">
        <div class="iconos-flotantes">
            <div class="modo-switch" onclick="cargarSolicitudes()">🔄</div>
        </div>

        <h2>Solicitudes Admin</h2>
        <div id="contenedor">
            <p style="text-align: center; color: #999;">Buscando solicitudes pendientes...</p>

        </div>
         <button class="logout" onclick="cerrarSesion()">Cerrar sesión</button>
        <a href="register_admin.html">Registrar un nuevo administrador</a>
    </div>

    <script>
        async function cargarSolicitudes() {
            const contenedor = document.getElementById('contenedor');
            try {
                const res = await fetch('http://localhost:3000/acceso/pendientes');
                const data = await res.json();

                if (data.length === 0) {
                    contenedor.innerHTML = '<p style="text-align: center;">No hay nadie esperando aprobación. 😎</p>';
                    return;
                }

                contenedor.innerHTML = '';
                data.forEach(user => {
                    contenedor.innerHTML += `
                        <div class="card" id="user-${user.cod_user}">
                            <p class="nombre">${user.nombres} ${user.apellidos}</p>
                            <p>📧 ${user.correo}</p>
                            <div class="btn-group">
                                <button class="btn-aprobar" onclick="aprobar(${user.cod_user})">Aprobar</button>
                                <button class="btn-rechazar">Rechazar</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                contenedor.innerHTML = '<p style="color:red;">Error al conectar con la API.</p>';
            }
        }

        async function aprobar(id) {
            try {
                const res = await fetch(`http://localhost:3000/acceso/aprobar/${id}`, {
                    method: 'PATCH'
                });
                if (res.ok) {
                    document.getElementById(`user-${id}`).style.display = 'none';
                    alert("¡Usuario aprobado! Ahora es Administrador.");
                }
            } catch (err) {
                alert("Error al aprobar");
            }
        }

        // Cargar al abrir la página
        cargarSolicitudes();
        function cerrarSesion() { localStorage.clear(); window.location.href = '../login.html'; }
    </script>
</body>
</html>
