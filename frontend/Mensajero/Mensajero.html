<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Mensajero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    
    * {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0d47a1, #1976d2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.mobile {
  width: 100%;
  max-width: 390px;
  height: 100vh;
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 25px;
  overflow-y: auto;
}

.logo {
      width: 130px;
      margin: 0 auto 15px;
      display: block;
    }

h2 {
  text-align: center;
  color: #0d47a1;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.message {
  text-align: center;
  margin-top: 10px;
}

.d-none {
  display: none;
}
.btn-perfil {
  display: block;
  width: 100%;
  text-align: center;
  padding: 14px;
  background: linear-gradient(180deg, #1976d2, #0d47a1);
  color: white;
  border-radius: 14px;
  font-weight: bold;
  text-decoration: none;
  margin-top: 19px;
  transition: 0.2s;
}

.btn-perfil:hover {
  transform: scale(1.03);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn-perfil:active {
  transform: scale(0.97);
}
.iconos-flotantes {
  position: absolute;
  top: 15px;
  right: 15px;
  display: flex;
  flex-direction: column; /* 🔥 esto los pone hacia abajo */
  gap: 10px; /* espacio entre iconos */
}

.modo-switch {
  background: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.modo-switch:hover {
  transform: scale(1.1);
}

.modo-switch:active {
  transform: scale(0.95);
}
.mobile {
  position: relative; /* 🔥 CLAVE */
}
  </style>
</head>

<body>



<div class="mobile">

<img src="../assets/logo.png" class="logo" alt="Complebox">

    <h2 id="titulomen"></h2>

<h3>Registrar Pedido</h3>

<div class="form-group">
    <label>Número de guía</label>

    <input 
      id="numero_guia"
      required
      type="text"
      inputmode="text"
      maxlength="30"
      minlength="4"

      placeholder="Ej: TCC-928282"

      pattern="[A-Za-z0-9-]+"

      oninput="
        this.value = this.value
        .replace(/[^A-Za-z0-9-]/g, '')
        .toUpperCase()
      "

      title="Solo letras, números y guiones"
    >
  </div>

  <!-- Nombre pedido -->
  <div class="form-group">
    <label>Nombre del pedido</label>

    <input 
      id="nombre_pedido"
      required
      type="text"
      maxlength="50"
      minlength="3"

      placeholder="Ej: Audífonos"

      oninput="
        this.value = this.value
        .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ]/g, '')
      "
    >
  </div>

  <!-- Descripción -->
  <div class="form-group">
    <label>Descripción</label>

    <input 
      id="descripcion_pedido"
      required
      type="text"
      maxlength="120"
      minlength="5"

      placeholder="Descripción breve del paquete"

      oninput="
        this.value = this.value
        .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ,.()-]/g, '')
      "
    >
  </div>

  <!-- Buscar residente -->
  <div class="form-group">
    <label>Buscar residente</label>

    <input 
      id="buscar_residente"
      required
      type="text"
      maxlength="60"

      placeholder="Nombre o cédula"

      oninput="
        this.value = this.value
        .replace(/[^A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ]/g, '')
      "
    >

    <div id="resultados" style="
      background:#fff;
      border:1px solid #ccc;
      border-radius:10px;
      margin-top:5px;
      max-height:150px;
      overflow-y:auto;
    "></div>
  </div>

 <div class="form-group">
    <label>Foto del Paquete</label>
    <div id="camera-container" style="display: none; text-align: center;">
        <video id="video" width="100%" style="border-radius: 12px; background: #000;" autoplay></video>
        <canvas id="canvas" style="display: none;"></canvas>
        <button type="button" onclick="tomarFoto()" style="background: #4caf50;">📸 Capturar Foto</button>
    </div>
    
    <div id="preview-container" style="text-align: center; margin-top: 10px;">
        <img id="photo-preview" src="" style="width: 100%; border-radius: 12px; display: none; border: 1px solid #ccc;">
        <button type="button" id="btn-abrir-camara" onclick="iniciarCamara()">📷 Abrir Cámara</button>
    </div>
</div>

<button onclick="crearPedido()">Registrar Pedido</button>
<h2>📊 Historial de pedidos</h2>
<input type="text" id="buscarHistorial" placeholder="Buscar...">
<div id="tablaHistorial"></div>
<button onclick="cerrarSesion()">Cerrar sesión</button>
<a href="../actualizar.html" class="btn-perfil">
  ✏️ Editar perfil
</a>
<a href="editar-empresa.html" class="btn-perfil">
  ✏️🏢 Editar empresa
</a>

<div class="iconos-flotantes">
<div class="modo-switch" onclick="irModoResidente()">
  🏠
</div>
<div class="modo-switch" onclick="irModoVigilante()">
  👮‍♂️
  </div>
  <div class="modo-switch" onclick="irModoPropietario()">
  🔑
  </div>
  <div class="modo-switch" onclick="irModoAdministrador()">
  ⚙️
  </div>

</div>
<script>

// ==========================
// 🔥 VALIDAR MODO MENSAJERO
// ==========================
async function validarModoMensajero() {

  try {
    const res = await fetch("http://localhost:3000/mensajero/validar-empresa", {
      headers: {
        Authorization: "Bearer " + localStorage.getItem("token")
      }
    });

    const data = await res.json();
    console.log("VALIDACION:", data);

    // ❌ NO TIENE EMPRESA
    if (!data.acceso) {

      const app = document.querySelector(".mobile");

      app.innerHTML = `
        <div style="
          height:100%;
          display:flex;
          justify-content:center;
          align-items:center;
          text-align:center;
          padding:20px;
        ">
          <div>
            <h2 style="color:#d32f2f;">🚫 Acceso restringido</h2>
            <p>${data.mensaje}</p>
            <div class="iconos-flotantes">
                <div class="modo-switch" onclick="irModoResidente()" title="Modo Residente">🏠</div>
                <div class="modo-switch" onclick="irModoMensajero()" title="Modo Mensajero">🚚</div>
                <div class="modo-switch" onclick="irModoVigilante()" title="Modo Vigilante">👮‍♂️</div>
                <div class="modo-switch" onclick="irModoPropietario()" title="Modo Propietario">🔑</div>
                <div class="modo-switch" onclick="irModoAdministrador()" title="Modo Administrador">⚙️</div>
            </div>
            <button onclick="irRegistroEmpresa()">Registrar empresa</button>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
          </div>
        </div>
      `;

      return;
    }

    // ✅ TIENE EMPRESA → carga normal
    cargarPerfilmen();
    // 👉 si luego tienes función de pedidos, la llamas aquí

  } catch (err) {
    console.error("Error validando empresa:", err);
  }
}


// ==========================
// 👤 CARGAR PERFIL MENSAJERO
// ==========================
async function cargarPerfilmen() {

  const token = localStorage.getItem("token");

  try {
    const res = await fetch("http://localhost:3000/mensajero/perfilmen", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    if (!res.ok) {
      throw new Error("No se pudo obtener el perfil");
    }

    const data = await res.json();

    console.log("Perfil:", data);

    const titulomen = document.getElementById("titulomen");

    if (titulomen) {
      titulomen.innerText = `👋 Hola, ${data.nombres || 'Mensajero'} ${data.apellidos || ''} 🚚`;
    }

  } catch (error) {
    console.error("Error perfil:", error);
  }
}


// ==========================
// 📦 CREAR PEDIDO
// ==========================
async function crearPedido() {

  const numeroGuia = document.getElementById("numero_guia").value.trim();
  const nombrePedido = document.getElementById("nombre_pedido").value.trim();
  const descripcionPedido = document.getElementById("descripcion_pedido").value.trim();
  const residenteInput = document.getElementById("buscar_residente").value.trim();

  // 🔥 VALIDACIONES

  if (!numeroGuia) {
    alert("⚠️ Debes ingresar el número de guía");
    return;
  }

  if (numeroGuia.length < 4) {
    alert("⚠️ El número de guía es demasiado corto");
    return;
  }

  if (!/^[A-Z0-9-]+$/i.test(numeroGuia)) {
    alert("⚠️ La guía solo puede contener letras, números y guiones");
    return;
  }

  if (!nombrePedido) {
    alert("⚠️ Debes ingresar el nombre del pedido");
    return;
  }

  if (nombrePedido.length < 3) {
    alert("⚠️ El nombre del pedido es muy corto");
    return;
  }

  if (!descripcionPedido) {
    alert("⚠️ Debes ingresar la descripción");
    return;
  }

  if (descripcionPedido.length < 5) {
    alert("⚠️ La descripción es demasiado corta");
    return;
  }

  if (!residenteInput) {
    alert("⚠️ Debes buscar un residente");
    return;
  }

  if (!residenteSeleccionado) {
    alert("⚠️ Debes seleccionar un residente de la lista");
    return;
  }

  

  // 🔥 DATA
  const data = {
    numero_guia: numeroGuia,
    nombre_pedido: nombrePedido,
    descripcion_pedido: descripcionPedido,
    fk_residente: residenteSeleccionado,
    foto_paquete: imageBase64
  };

  try {

    const boton = document.querySelector("button[onclick='crearPedido()']");
    boton.disabled = true;
    boton.innerText = "Registrando...";

    const res = await fetch("http://localhost:3000/mensajero/crear-pedido", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("token")
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
      throw new Error(result.message || "Error al registrar pedido");
    }

    // 🔥 LIMPIAR
    document.getElementById("numero_guia").value = "";
    document.getElementById("nombre_pedido").value = "";
    document.getElementById("descripcion_pedido").value = "";
    document.getElementById("buscar_residente").value = "";

    residenteSeleccionado = null;
    document.getElementById("resultados").innerHTML = "";

    alert("✅ Pedido registrado correctamente");

  } catch (err) {

    alert("❌ " + err.message);

  } finally {

    const boton = document.querySelector("button[onclick='crearPedido()']");
    boton.disabled = false;
    boton.innerText = "Registrar Pedido";

  }
}


// ==========================
// 🔐 CERRAR SESIÓN
// ==========================
function cerrarSesion() {
  localStorage.clear();
  window.location.href = '../login.html';
}


// ==========================
// 🏢 IR A REGISTRAR EMPRESA
// ==========================
function irRegistroEmpresa() {
  window.location.href = "editar-empresa.html";
}


// ==========================
// 🔍 BUSCAR RESIDENTE
// ==========================
const inputBuscar = document.getElementById("buscar_residente");
const resultados = document.getElementById("resultados");

let residenteSeleccionado = null;

inputBuscar.addEventListener("input", async () => {

  const query = inputBuscar.value.trim();

  if (query.length < 2) {
    resultados.innerHTML = "";
    return;
  }

  const res = await fetch(`http://localhost:3000/mensajero/buscar-residente?q=${query}`);
  const data = await res.json();

  resultados.innerHTML = "";

  data.forEach(persona => {

    const div = document.createElement("div");
    div.style.padding = "10px";
    div.style.cursor = "pointer";

    div.textContent = `${persona.nombres} ${persona.apellidos} - ${persona.cedula}`;

    div.onclick = () => {
      inputBuscar.value = div.textContent;
      resultados.innerHTML = "";
      residenteSeleccionado = persona.cod_user;
    };

    resultados.appendChild(div);
  });

});


// ==========================
// 📊 HISTORIAL
// ==========================
const inputHistorial = document.getElementById("buscarHistorial");
const tabla = document.getElementById("tablaHistorial");

inputHistorial.addEventListener("input", async () => {

  const query = inputHistorial.value.trim();

  if (query.length === 0) {
    tabla.innerHTML = "";
    return;
  }

  const res = await fetch(`http://localhost:3000/mensajero/historial?query=${query}`, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  tabla.innerHTML = "";

  data.forEach(p => {

    const div = document.createElement("div");

    let acciones = "";

    if (p.fk_estado_pedido == 1) {
      acciones = `
        <button onclick="editarPedido(${p.cod_pedido_estado_entrega})">✏️ Editar</button>
        <button onclick="eliminarPedido(${p.cod_pedido_estado_entrega})">❌ Eliminar</button>
      `;
    }

    div.innerHTML = `
  <b>📦 Pedido:</b> ${p.nombre_pedido}<br>
  <b>🔢 Guía:</b> ${p.numero_guia}<br>
  <b>📌 Estado:</b> ${p.estado_pedido || "Sin estado"}<br>
  <b>🙍  Nombre:</b> ${p.nombre_residente || "Sin estado"}<br>
  <b>👤 Apellido:</b> ${p.apellido_residente || "Sin estado"}<br>
  <b>🪪 Cedula:</b> ${p.cedula || "Sin estado"}<br>
  <b>🏘️ Conjunto:</b> ${p.nombre_conjunto || 'No disponible'}<br>
  <b>📅 Recibido:</b> ${p.fecha_recibido}<br>
  <b>📅 Entrega:</b> ${p.fecha_entregado || 'Pendiente'}<br>

  <b>👮 Recibe:</b> ${p.nombre_vigilante_recibe || ''} ${p.apellido_vigilante_recibe || ''}<br>
  <b>👮 Entrega:</b> ${p.nombre_vigilante_entrega || ''} ${p.apellido_vigilante_entrega || ''}<br>

  <b>🏢 Apto:</b> ${
    p.numero_torre && p.numero_apto
      ? `Torre ${p.numero_torre} - Apto ${p.numero_apto}`
      : "❌ No asignado"
  }<br>

  <b>✍️ Firma:</b><br>
  ${
    p.firma_residente
      ? `<img src="${p.firma_residente}" style="width:120px; border-radius:10px; margin-top:5px;">`
      : `<span style="color:red;">❌ No registrada</span><br>`
  }
  <b>🖼️ Foto:</b><br>
  ${
    p.foto_pedido
      ? `<img src="${p.foto_pedido}" style="width:120px; border-radius:10px; margin-top:5px;">`
      : `<span style="color:red;">❌ No registrada</span>`
  }

  ${acciones}

  <hr>
`;
    tabla.appendChild(div);
  });

});


// ==========================
// ❌ ELIMINAR PEDIDO
// ==========================
async function eliminarPedido(id) {

  const confirmar = confirm("¿Eliminar pedido?");
  if (!confirmar) return;

  const res = await fetch(`http://localhost:3000/mensajero/eliminar/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  if (res.ok) {
    alert("Pedido eliminado");
    inputHistorial.dispatchEvent(new Event("input"));
  }
}


// ==========================
// ✏️ EDITAR PEDIDO
// ==========================
function editarPedido(id) {
  console.log("ID que llega al botón:", id);

  window.location.href = `editar_pedido.html?id=${id}`;
}

// ==========================
// 🔄 CAMBIAR A RESIDENTE
// ==========================
function irModoResidente() {

  localStorage.setItem("modo", "residente");

  localStorage.removeItem("estadoEspecial");
  localStorage.removeItem("mensajeEstado");

  window.location.href = "../residente/Residente.html";
}
function irModoVigilante() { window.location.href = "../vigilante/vigilante.html"; }
function irModoPropietario() { window.location.href = "../propietario/propietario.html"; }
function irModoAdministrador() { window.location.href = "../admin/admin.html"; }
function irModoMensajero() { window.location.href = "../mensajero/mensajero.html"; }
// ==========================
// 🚀 INICIO
// ==========================
validarModoMensajero();

let imageBase64 = null;

async function iniciarCamara() {
    const video = document.getElementById('video');
    const container = document.getElementById('camera-container');
    const btnAbrir = document.getElementById('btn-abrir-camara');

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" }, // Prioriza cámara trasera en móviles
            audio: false 
        });
        video.srcObject = stream;
        container.style.display = 'block';
        btnAbrir.style.display = 'none';
    } catch (err) {
        alert("❌ No se pudo acceder a la cámara: " + err.message);
    }
}

function tomarFoto() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('photo-preview');
    const container = document.getElementById('camera-container');
    const btnAbrir = document.getElementById('btn-abrir-camara');

    // Dibujar el frame del video en el canvas
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    // Convertir a Base64
    imageBase64 = canvas.toDataURL('image/jpeg');

    // Detener cámara
    const stream = video.srcObject;
    stream.getTracks().forEach(track => track.stop());

    // Mostrar vista previa y limpiar interfaz
    preview.src = imageBase64;
    preview.style.display = 'block';
    container.style.display = 'none';
    btnAbrir.innerText = "🔄 Cambiar Foto";
    btnAbrir.style.display = 'block';
}

</script>
</body>
