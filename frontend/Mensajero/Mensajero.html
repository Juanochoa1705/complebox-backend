<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Mensajero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    
    * {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(180deg, #0d47a1, #1976d2);
  display: flex;
  justify-content: center;
  align-items: center;
}

.mobile {
  width: 100%;
  max-width: 390px;
  height: 100vh;
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 25px;
  overflow-y: auto;
}

.logo {
      width: 130px;
      margin: 0 auto 15px;
      display: block;
    }

h2 {
  text-align: center;
  color: #0d47a1;
  margin-bottom: 20px;
}

.form-group {
  margin-bottom: 12px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.message {
  text-align: center;
  margin-top: 10px;
}

.d-none {
  display: none;
}
.btn-perfil {
  display: block;
  width: 100%;
  text-align: center;
  padding: 14px;
  background: linear-gradient(180deg, #1976d2, #0d47a1);
  color: white;
  border-radius: 14px;
  font-weight: bold;
  text-decoration: none;
  margin-top: 19px;
  transition: 0.2s;
}

.btn-perfil:hover {
  transform: scale(1.03);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.btn-perfil:active {
  transform: scale(0.97);
}
.modo-switch {
  position: absolute;
  top: 15px;
  right: 15px;
  background: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  transition: 0.2s;
}

.modo-switch:hover {
  transform: scale(1.1);
}

.modo-switch:active {
  transform: scale(0.95);
}
.mobile {
  position: relative; /* 🔥 CLAVE */
}
  </style>
</head>

<body>



<div class="mobile">

<img src="../assets/logo.png" class="logo" alt="Complebox">

    <h2 id="titulomen"></h2>

<h3>Registrar Pedido</h3>

<div class="form-group">
  <label>Número de guía</label>
  <input id="numero_guia" required>
</div>

<div class="form-group">
  <label>Nombre del pedido</label>
  <input id="nombre_pedido" required>
</div>

<div class="form-group">
  <label>Descripción</label>
  <input id="descripcion_pedido" required>
</div>

<div class="form-group">
  <label>Buscar residente</label>
  <input id="buscar_residente" placeholder="Nombre o cédula">

  <div id="resultados" style="
    background:#fff;
    border:1px solid #ccc;
    border-radius:10px;
    margin-top:5px;
    max-height:150px;
    overflow-y:auto;
  "></div>
</div>

<button onclick="crearPedido()">Registrar Pedido</button>
<h2>📊 Historial de pedidos</h2>
<input type="text" id="buscarHistorial" placeholder="Buscar...">
<div id="tablaHistorial"></div>
<button onclick="cerrarSesion()">Cerrar sesión</button>
<a href="../actualizar.html" class="btn-perfil">
  ✏️ Editar perfil
</a>
<a href="editar-empresa.html" class="btn-perfil">
  ✏️🏢 Editar empresa
</a>
<div class="modo-switch" onclick="irModoResidente()">
  🏠
</div>

<script >


  async function cargarPerfilmen() {
  const token = localStorage.getItem("token");

  try {
    const res = await fetch("http://localhost:3000/mensajero/perfilmen", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    if (!res.ok) {
        throw new Error("No se pudo obtener el perfil. Status: " + res.status);
    }

    const data = await res.json();

    // Verificamos en consola qué está llegando realmente
    console.log("Datos recibidos:", data);

    const titulomen = document.getElementById("titulomen");

    if (titulomen) titulomen.innerText = `👋 Hola, ${data.nombres || 'Mensajero' } ${data.apellidos }-Mensajero 🚚`;

  } catch (error) {
    console.error("Error al cargar perfil:", error);
  }
}
async function crearPedido() {

    if (!residenteSeleccionado) {
    alert("Selecciona un residente");
    return;
  }

  const data = {
    numero_guia: document.getElementById("numero_guia").value,
    nombre_pedido: document.getElementById("nombre_pedido").value,
    descripcion_pedido: document.getElementById("descripcion_pedido").value,
    fk_residente: residenteSeleccionado,

 
  };

  try {
    const res = await fetch("http://localhost:3000/mensajero/crear-pedido", {
  method: "POST",
  headers: {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + localStorage.getItem("token") // 🔥 CLAVE
  },
  body: JSON.stringify(data)
});

    const result = await res.json();

    if (!res.ok) throw new Error(result.message);

document.getElementById("numero_guia").value = "";
document.getElementById("nombre_pedido").value = "";
document.getElementById("descripcion_pedido").value = "";
document.getElementById("buscar_residente").value = "";

residenteSeleccionado = null;
document.getElementById("resultados").innerHTML = "";

    alert("✅ Pedido registrado");
  } catch (err) {
    alert(err.message);
  }


}

function cerrarSesion() {
  localStorage.clear();
  window.location.href = '../login.html';
}

const inputBuscar = document.getElementById("buscar_residente");
const resultados = document.getElementById("resultados");

let residenteSeleccionado = null;

inputBuscar.addEventListener("input", async () => {

  const query = inputBuscar.value.trim();

  if (query.length < 2) {
    resultados.innerHTML = "";
    return;
  }



  const res = await fetch(`http://localhost:3000/mensajero/buscar-residente?q=${query}`);
  const data = await res.json();

  resultados.innerHTML = "";

  data.forEach(persona => {
    const div = document.createElement("div");

    div.style.padding = "10px";
    div.style.cursor = "pointer";

    div.textContent = `${persona.nombres} ${persona.apellidos} - ${persona.cedula}`;

    div.onclick = () => {
      inputBuscar.value = div.textContent;
      resultados.innerHTML = "";

      // 🔥 guardamos el ID REAL
      residenteSeleccionado = persona.cod_user;
    };

    resultados.appendChild(div);
  });

});

const inputHistorial = document.getElementById("buscarHistorial");
const tabla = document.getElementById("tablaHistorial");

inputHistorial.addEventListener("input", async () => {

  const query = inputHistorial.value.trim();

  if (query.length === 0) {
    tabla.innerHTML = "";
    return;
  }

  const res = await fetch(`http://localhost:3000/mensajero/historial?query=${query}`, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  tabla.innerHTML = "";

  data.forEach(p => {

    const div = document.createElement("div");

    // 🔥 BOTONES SOLO SI ESTADO 1
    let acciones = "";

    if (p.fk_estado_pedido == 1) {
      acciones = `
        <button onclick="editarPedido(${p.cod_pedido_estado_entrega})">✏️ Editar</button>
        <button onclick="eliminarPedido(${p.cod_pedido_estado_entrega})">❌ Eliminar</button>
      `;
    }

    div.innerHTML = `
      <b>📦 Pedido:</b> ${p.nombre_pedido || '❌ Sin nombre'}<br>
      <b>🔢 Guía:</b> ${p.numero_guia || '❌ Sin guía'}<br>
      <b>📌 Estado:</b> ${p.estado_pedido || '❌ Sin estado'}<br>
      
      <b>📅 Recibido:</b> ${p.fecha_recibido || '❌ No registrado'}<br>
      <b>📅 Entregado:</b> ${p.fecha_entregado || '⏳ Pendiente'}<br>

      <b>👮 Recibe:</b> ${p.nombre_vigilante_recibe || '❌'} ${p.apellido_vigilante_recibe || ''}<br>
      <b>👮 Entrega:</b> ${p.nombre_vigilante_entrega || '❌'} ${p.apellido_vigilante_entrega || ''}<br>

      <b>🏠 Residente:</b> ${p.nombre_residente || '❌'} ${p.apellido_residente || ''}<br>
      <b>🆔 Cédula:</b> ${p.cedula || '❌'}<br>
      <b>🏢 Apto:</b> Torre ${p.numero_torre || '❌'} - Apto ${p.numero_apto || '❌'}<br>
      <b>🏘️ Conjunto:</b> ${p.nombre_conjunto || 'No disponible'}<br>
      ${acciones}
      <hr>
    `;

    tabla.appendChild(div);
  });

});

async function eliminarPedido(id) {

  const confirmar = confirm("¿Eliminar pedido?");
  if (!confirmar) return;

  const res = await fetch(`http://localhost:3000/mensajero/eliminar/${id}`, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  if (res.ok) {
    alert("Pedido eliminado");
    inputHistorial.dispatchEvent(new Event("input"));
  }
}

function editarPedido(id) {
  window.location.href = `editar_pedido.html?id=${id}`;
}

cargarPerfilmen();

function irModoResidente() {
  localStorage.setItem("modo", "residente");

  // 🔥 LIMPIA ESTADO ANTERIOR
  localStorage.removeItem("estadoEspecial");
  localStorage.removeItem("mensajeEstado");

  window.location.href = "../residente/Residente.html";
}

</script>
</body>
