<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Complebox | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #0d47a1, #1976d2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* CONTENEDOR TIPO APP */
    .mobile {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 25px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      width: 130px;
      margin: 0 auto 15px;
      display: block;
    }

    h2 {
      text-align: center;
      color: #0d47a1;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
      display: block;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #1976d2;
      box-shadow: 0 0 0 2px rgba(25,118,210,0.2);
    }

    button {
      width: 100%;
      padding: 16px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #1976d2;
      text-decoration: none;
      font-weight: 600;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
  </style>
</head>

<body>

 <div class="mobile">
    <img src="assets/logo.png" class="logo" alt="Complebox">
    
    <div id="contenedor-login">
        <h2>Iniciar sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuario</label>
                <input id="usuario" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit">Entrar</button>
        </form>

        <div class="link">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </div>

        <div class="link">
            <a href="#" onclick="manejarOlvidoContrasena()">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <div id="seccion-reset" style="display:none;">
        <h2 style="font-size: 20px;">Recuperar Cuenta</h2>
        <p style="text-align: center; font-size: 13px; color: #666; margin-bottom: 20px;">
            Ingresa el código enviado a tu correo y tu nueva contraseña.
        </p>

        <div class="form-group">
            <label>Código de verificación</label>
            <input type="text" id="input-codigo" placeholder="Ej: 123456" maxlength="6">
        </div>

        <div class="form-group">
            <label>Nueva Contraseña</label>
            <input type="password" id="input-nueva-pass" placeholder="Mín 8 caracteres, 1 mayús, 1 núm y 1 carácter especial">
        </div>

        <button type="button" onclick="enviarNuevaPassword()">Cambiar Contraseña</button>
        
        <div class="link">
            <a href="#" onclick="window.location.reload()">Volver al Login</a>
        </div>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
const form = document.getElementById('loginForm');
const message = document.getElementById('message');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const data = {
    usuario: document.getElementById('usuario').value,
    password: document.getElementById('password').value
  };

  try {
    const res = await fetch('http://localhost:3000/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) throw new Error(result.message);

    // 🔥 PRIMER LOGIN
    if (result.primerLogin) {

      message.textContent = result.message;
      message.className = 'message error';

      localStorage.setItem('primerLoginUserId', result.user.cod_user);

      setTimeout(() => {
        window.location.href = 'primer-login.html';
      }, 1500);

      return;
    }

    // 🔐 LOGIN NORMAL
    localStorage.setItem('token', result.token);
    localStorage.setItem('user', JSON.stringify(result.user));

    // 🔥 ESTA ES LA LÍNEA QUE TE FALTABA
  localStorage.setItem("userId", result.user.cod_user || result.user.id);

    localStorage.setItem('estadoEspecial', result.estadoEspecial);
    localStorage.setItem('mensajeEstado', result.mensaje);

    // 👉 Redirección por rol
    if (result.user.rol === 'Administrador') {
      window.location.href = '../frontend/admin/admin.html';
    } 
    else if (result.user.rol === 'Propietario') {
      window.location.href = '../frontend/propietario/propietario.html';
    }
    else if (result.user.rol === 'Mensajero') {
      window.location.href = '../frontend/mensajero/mensajero.html';
    }
    else if (result.user.rol === 'Vigilante') {
      window.location.href = '../frontend/vigilante/Vigilante.html';
    }
    else if (result.user.rol === 'Residente') {
      window.location.href = '../frontend/residente/Residente.html';
    }
    else if (result.user.rol === 'Superadmin') {
      window.location.href = '../frontend/superadmin/Notificaciones.html';
    }
    else {
      message.textContent = 'Rol no habilitado por ahora';
      message.className = 'message error';
    }

  } catch (err) {
    message.textContent = err.message || 'Error al iniciar sesión';
    message.className = 'message error';
  }
});
const API_URL = "http://localhost:3000";
let correoAuxiliar = ""; // Variable para recordar a quién le cambiamos la clave

async function manejarOlvidoContrasena() {
    const correo = prompt("Ingresa tu correo electrónico:");
    if (!correo) return;

    try {
        const response = await fetch(`${API_URL}/auth/recuperar-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ correo: correo })
        });

        const data = await response.json();

        if (response.ok) {
            alert("¡Código enviado! Revisa tu bandeja de Mailtrap.");
            
            // 1. Guardamos el correo para el siguiente paso
            correoAuxiliar = correo; 
            
            // 2. Ocultamos el formulario de login y mostramos el de reset
            document.getElementById('loginForm').style.display = 'none';
            document.querySelectorAll('.link').forEach(el => el.style.display = 'none');
            document.getElementById('seccion-reset').style.display = 'block';
            
        } else {
            alert("Error: " + (data.message || "No se pudo enviar"));
        }
    } catch (error) {
        console.error("Error en la petición:", error);
        alert("No se pudo conectar con el servidor.");
    }
}

// Esta es la función que dispara el botón del nuevo formulario
async function enviarNuevaPassword() {
    const codigo = document.getElementById('input-codigo').value;
    const passNueva = document.getElementById('input-nueva-pass').value;

    if (!codigo || !passNueva) {
        alert("Por favor completa los campos.");
        return;
    }

    try {
        const response = await fetch(`${API_URL}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                correo: correoAuxiliar, 
                codigo: codigo, 
                nuevaPassword: passNueva 
            })
        });

        const data = await response.json();

        if (response.ok) {
            alert("¡Éxito! Contraseña cambiada. Ahora inicia sesión.");
            window.location.reload(); // Recarga la página para volver al login normal
        } else {
            alert("Error: " + data.message);
        }
    } catch (error) {
        alert("Error al conectar con el servidor.");
    }
}
</script>


</body>
</html>
