<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Residente</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(180deg, #0d47a1, #1976d2);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .mobile {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 25px;
      overflow-y: auto;
    }

    h2 {
      text-align: center;
      color: #0d47a1;
      margin-bottom: 20px;
    }

    /* Tarjetas de pedidos estilo limpio */
    .card {
      border: 1px solid #eee;
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      background: #f9f9f9;
    }

    .card b {
      color: #0d47a1;
      font-size: 1.1rem;
    }

    .info-guia {
      color: #666;
      font-size: 0.9rem;
      margin: 5px 0;
    }

    /* Botones con el estilo solicitado */
    button {
      width: 100%;
      padding: 14px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:active {
      transform: scale(0.98);
    }

    /* Colores específicos para acciones */
    .btn-recoger {
      background: #f39c12; /* Naranja para llamar la atención */
    }

    .btn-firmar {
      background: #27ae60; /* Verde para confirmar */
    }

    .btn-logout {
      background: transparent;
      color: #e74c3c;
      border: 1px solid #e74c3c;
      margin-top: 25px;
    }

    /* MODAL FIRMA */
    #firmaContainer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }

    #firmaBox {
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 350px;
    }

    canvas {
      border: 2px solid #1976d2;
      border-radius: 12px;
      background: #fafafa;
      touch-action: none; /* Importante para firmas en móvil */
      width: 100%;
      height: auto;
    }


    .logo {
        width: 150px; /* Tamaño más equilibrado */
        margin: 0 auto 20px;
        display: block;
    }

    h2 {
        text-align: center;
        color: #0d47a1;
        font-size: 24px;
        margin: 10px 0;
        font-family: 'Segoe UI', sans-serif;
    }

    #ubicacion {
        text-align: center;
        font-size: 16px;
        color: #666;
        margin-bottom: 20px;
    }

    input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

  </style>
</head>
<body>

<div class="mobile">

  <img src="../assets/logo.png" class="logo">
    <h2 id="titulores"></h2>
    <p id="ubicacionres"></p>

  <h3>📦 Mis nuevos pedidos</h3>

  <div id="listaPedidos"></div>
  
  <h3>📊 Historial de pedidos</h3>

<input type="text" id="buscarHistorial" placeholder="Buscar por guía o pedido...">

<div id="tablaHistorial"></div><button class="btn btn-logout" onclick="cerrarSesion()">Cerrar sesión</button>
</div>


<div id="firmaContainer">
  <div id="firmaBox">
    <h4>✍️ Firme aquí para recibir</h4>
    <canvas id="canvasFirma" width="300" height="200"></canvas>
    <br><br>
    <button class="btn btn-firmar" onclick="guardarFirma()">Confirmar Entrega</button>
    <button class="btn" style="background:#95a5a6" onclick="limpiarFirma()">Limpiar</button>
    <button class="btn" style="background:#7f8c8d" onclick="cerrarFirma()">Cancelar</button>
  </div>



</div>



<script>





const contenedorPedidos = document.getElementById("listaPedidos");
let pedidoSeleccionado = null;

async function cargarPerfilres() {
  const token = localStorage.getItem("token");

  try {
    const res = await fetch("http://localhost:3000/residente/perfilres", {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });

    if (!res.ok) {
        throw new Error("No se pudo obtener el perfil. Status: " + res.status);
    }

    const data = await res.json();

    // Verificamos en consola qué está llegando realmente
    console.log("Datos recibidos:", data);

    const titulores = document.getElementById("titulores");
    const ubicacionres = document.getElementById("ubicacionres");

    if (titulores) titulores.innerText = `👋 Hola, ${data.nombres || 'Residente' } ${data.apellidos  || 'Residente'}`;
    if (ubicacionres) ubicacionres.innerText = `🏢 Torre ${data.torre || '?'} • Apto ${data.apto || '?'} -Residente`;

  } catch (error) {
    console.error("Error al cargar perfil:", error);
  }
}

// 1. CARGAR PEDIDOS
// 1. CARGAR PEDIDOS
async function cargarPedidos() {
  const res = await fetch("http://localhost:3000/residente/mis-pedidos", {
    headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
  });
  const pedidos = await res.json();

  if (!Array.isArray(pedidos)) return;

  // 🔥 FILTRAR LOS QUE NO SEAN ESTADO 5
  const pedidosFiltrados = pedidos.filter(p => p.fk_estado_pedido !== 5);

  contenedorPedidos.innerHTML = "";

  pedidosFiltrados.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    let htmlBotones = "";

    if (p.fk_estado_pedido === 2) {
      htmlBotones = `<button class="btn btn-recoger" onclick="recogerPedido(${p.cod_pedido_estado_entrega})">📦 Marcar como Recogido</button>`;
    } 
    else if (p.fk_estado_pedido === 4) {
      htmlBotones = `<button class="btn btn-firmar" onclick="abrirFirma(${p.cod_pedido_estado_entrega})">✍️ Firmar Entrega</button>`;
    }

    div.innerHTML = `
      <strong>${p.nombre_pedido}</strong><br>
      <small>Guía: ${p.numero_guia}</small><br>
      <span>Estado: ${getEstado(p.fk_estado_pedido)}</span>
      ${htmlBotones}
    `;

    contenedorPedidos.appendChild(div);
  });
}

function getEstado(e) {
  const estados = { 2: "📥 Recibido", 3: "✅ En proceso", 4: "✍️ Pendiente firma", 5: "📬 Entregado" };
  return estados[e] || "⏳ Esta llegando...";
}

// 2. ACCIÓN: RECOGER (Pasar de 2 a 3)
async function recogerPedido(id) {
  const res = await fetch(`http://localhost:3000/residente/confirmar/${id}`, {
    method: "POST",
    headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
  });
  if(res.ok) { alert("Estado actualizado"); cargarPedidos(); }
}

// 3. LÓGICA DEL CANVAS (Mouse y Touch)
const canvas = document.getElementById("canvasFirma");
const ctx = canvas.getContext("2d");
let dibujando = false;

const obtenerPos = (e) => {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top };
};

const iniciar = (e) => { dibujando = true; const pos = obtenerPos(e); ctx.moveTo(pos.x, pos.y); };
const mover = (e) => {
  if (!dibujando) return;
  e.preventDefault();
  const pos = obtenerPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
};
const detener = () => { dibujando = false; ctx.beginPath(); };

canvas.addEventListener("mousedown", iniciar);
canvas.addEventListener("mousemove", mover);
canvas.addEventListener("mouseup", detener);
canvas.addEventListener("touchstart", iniciar, {passive: false});
canvas.addEventListener("touchmove", mover, {passive: false});
canvas.addEventListener("touchend", detener);

// 4. FUNCIONES FIRMA
function abrirFirma(id) {
  pedidoSeleccionado = id;
  document.getElementById("firmaContainer").style.display = "flex";
}
function cerrarFirma() { document.getElementById("firmaContainer").style.display = "none"; limpiarFirma(); }
function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.beginPath(); }

async function guardarFirma() {
  const firma = canvas.toDataURL(); // Imagen en Base64
  const res = await fetch(`http://localhost:3000/residente/firma/${pedidoSeleccionado}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + localStorage.getItem("token")
    },
    body: JSON.stringify({ firma })
  });
  if(res.ok) { alert("¡Entregado con éxito!"); cerrarFirma(); cargarPedidos(); }
}




function cerrarSesion() { localStorage.clear(); window.location.href = '../login.html'; }

const estadoEspecial = localStorage.getItem("estadoEspecial");
const mensaje = localStorage.getItem("mensajeEstado");

if (estadoEspecial === "true") {

  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      font-family:sans-serif;
    ">
      <div>
        <h2 style="color:#d32f2f;">⚠️ Acceso restringido</h2>
        <p>${mensaje}</p>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
      </div>
    </div>
  `;

} else {
  cargarPerfilres();
  cargarPedidos();
}
const input = document.getElementById("buscarHistorial");
const contenedorHistorial = document.getElementById("tablaHistorial");

input.addEventListener("input", async () => {

  const query = input.value.trim();

  if (query.length === 0) {
    contenedorHistorial.innerHTML = "";
    return;
  }

  const res = await fetch(`http://localhost:3000/residente/historial?query=${query}`, {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  contenedorHistorial.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");

  div.className = "card";

div.innerHTML = `
  <b>📦 Pedido:</b> ${p.nombre_pedido}<br>
  <b>🔢 Guía:</b> ${p.numero_guia}<br>
  <b>📌 Estado:</b> ${p.estado_pedido || "Sin estado"}<br>

  <b>📅 Recibido:</b> ${p.fecha_recibido}<br>
  <b>📅 Entrega:</b> ${p.fecha_entregado || 'Pendiente'}<br>

  <b>👮 Recibe:</b> ${p.nombre_vigilante_recibe || ''} ${p.apellido_vigilante_recibe || ''}<br>
  <b>👮 Entrega:</b> ${p.nombre_vigilante_entrega || ''} ${p.apellido_vigilante_entrega || ''}<br>

  <b>🚚 Mensajero:</b> ${p.nombre_mensajero || ''} ${p.apellido_mensajero || ''}<br>
  <b>🏢 Empresa:</b> ${p.nombre_empresa || ''}<br>

  <b>✍️ Firma:</b><br>
  ${
    p.firma_residente
      ? `<img src="${p.firma_residente}" style="width:120px; border-radius:10px; margin-top:5px;">`
      : `<span style="color:red;">❌ No registrada</span>`
  }

  <hr>
`;

    contenedorHistorial.appendChild(div);
  });

});
</script>
</body>
</html>
